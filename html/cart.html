<body>
  <div class="loader active">
    <div class="content">
      <svg viewBox="0 0 10 27" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0.5" y="0.5" width="9" height="17" stroke="black"/>
        <path d="M0.5 15.5V26H3V24M9.5 15.5V26H7V24" stroke="black"/>
      </svg>
    </div>
  </div>

  <header>
    <div class="wrapper">
      <div class="logo">
        <h2>Aluminum Calc</h2>
        <span>Item Price Calc</span>
      </div>
      <input type="checkbox" id="ch" />
      <label for="ch" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <label for="ch" class="overlay"></label>
      <nav>
        <label for="ch" class="close">
          <span></span>
          <span></span>
          <span></span>
        </label>
  
        <ul>
          <li><a href="aluminum-calcs.github.io/">Home</a></li>
          <li><a href="aluminum-calcs.github.io/item-price-calc/">Item Price Calc</a></li>
          <li><a href="aluminum-calcs.github.io/sliding-window-calc/">Aluminum Channels</a></li>
          <li><a href="ehiejakhian.github.io/OHONS-TECH/">Visit Ohons Tech </a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <form class="input">
      <div class="name group">
        <div class="field">
          <label for="name">item name</label>
          <input type="text" id="name" placeholder="Roller" value="Roller"/>
        </div>
        <div class="error-m">A valid item in our list please</div>
      </div>
      <div class="qty group">
        <div class="field">
          <label for="qty">quantity</label>
          <input type="number" id="qty" placeholder="1" value="1"/>
        </div>
        <div class="error-m">A valid Quantity</div>
      </div>
      <div class="price group">
        <div class="field">
          <label for="price">Price</label>
          <input type="number" id="price" placeholder="1000" value="1000"/>
        </div>
        <div class="error-m">You can set a custom price for this item</div>
      </div>
      <div class="links">
        <button id="submit">Add</button>
        <button id="submit-new">Add to <b>New</b> Cart</button>
      </div>
    </form>
    <section class="carts">
    </section>
  </main>

  <footer class="footer">
    <div class="footer__content">
      <p>
        <span>Meet the developer</span>
        <a href="https://ehiejakhian.github.io/">Ehi Ejakhian</a>
      </p>
    </div>
  </footer>

  <!-- TEMPLATES -->
  <template id="modal-popup">
    <div class="modal-popup">
      <div class="overlay"></div>
      <div class="modal">
        <div class="modal__header">
          <h2 class="h2">Heading</h2>
          <button class="close-modal"><i class="fa fa-close"></i></button>
        </div>
        <div class="modal__body">
          <p class="message">Lorem ipsum dolor sit amet consectetur adipisicing elit. Velit, nihil.</p>
          <div class="modal__body__input">
            <div class="field">
              <label for="modal-input">name</label>
              <input type="text" placeholder="Cart 1" class="modal-input-elem"/>
            </div>
            <div class="error-msg">We will use the default name if its empty</div>
          </div>
        </div>
        <div class="modal__footer">
          <button>Yes</button>
          <button>No</button>
          <button>maybe</button>
        </div>
      </div>
    </div>
  </template>
  <template id="cart">
    <div class="cart">
      <div class="header">
        <h2 class="cart-name">Cart 1</h2>
        <div class="cart-tools">
          <!-- <button><i class="fa fa-refresh"></i></button> -->
          <button><i class="fa fas fa-share-alt"></i></button>
          <button class="edit-cart" title="Rename cart"><i class="fa fa-pencil"></i></button>
          <button class="delete-cart"><i class="fa fa-trash"></i></button>
        </div>
      </div>
      <table class="table">
        <thead>
          <tr>
            <th>s/n</th>
            <th>Item name</th>
            <th>qty</th>
            <th colspan="2">price</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Roller</td>
            <td>1000(×1)</td>
            <td>1000</td>
            <td>×</td>
          </tr>
          <tr>
            <td>2</td>
            <td>width-channel</td>
            <td>17800(×2)</td>
            <td>35600</td>
            <td>×</td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="3">Total</td>
            <td colspan="2">36,600</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </template>

  <script src="./scripts/loader.js" type="module"></script>
  <script src="./scripts/form.js" type="module"></script>
  <script src="./scripts/form__autofill.js" type="module"></script>
  <script src="./scripts/cart__edit.js" type="module" defer></script>
  <script src="./scripts/cart__delete.js" type="module" defer></script>
  <script src="./scripts/cart__item__edit.js" type="module" defer></script>
</body>
</html>
